services:
  - type: web
    name: rag-document-chat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false           # set in Render dashboard
      - key: COHERE_API_KEY
        sync: false           # set in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: COLLECTION_NAME
        value: documents
      - key: CHROMA_PATH
        value: /tmp/chroma_db  # ephemeral on free tier — documents re-upload after restart
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: MAX_QUERY_LENGTH
        value: "500"
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MAX_HISTORY_TURNS
        value: "10"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_PASSWORD
        sync: false           # optional — set in Render dashboard to enable auth
